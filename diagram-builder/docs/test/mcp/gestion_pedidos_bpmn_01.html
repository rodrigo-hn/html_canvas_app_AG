<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diagram Export</title>
  <style>
    body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0f172a; }
    svg { max-width: 95vw; max-height: 95vh; }
  </style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="40 120 1740 160" width="1740" height="160">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
    <marker id="open-arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6" fill="none" stroke="#64748b" stroke-width="1.5" />
    </marker>
    <marker id="open-circle" markerWidth="10" markerHeight="10" refX="3" refY="3" orient="auto" markerUnits="strokeWidth">
      <circle cx="3" cy="3" r="2" fill="none" stroke="#64748b" stroke-width="1" />
    </marker>
  </defs>
  <line x1="110" y1="200" x2="310" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="310" y1="200" x2="520" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="520" y1="200" x2="730" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="614" y="192" width="22" height="16" rx="3" fill="white" fill-opacity="0.85" />
  <text x="625" y="200" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="600" fill="#334155">Sí</text>
  <line x1="520" y1="200" x2="1510" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="1004" y="192" width="22" height="16" rx="3" fill="white" fill-opacity="0.85" />
  <text x="1015" y="200" text-anchor="middle" dominant-baseline="middle" font-size="11" font-weight="600" fill="#334155">No</text>
  <line x1="730" y1="200" x2="990" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="990" y1="200" x2="1250" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="1250" y1="200" x2="1710" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <line x1="1510" y1="200" x2="1710" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)" />
  <rect x="80" y="170" width="60" height="60" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2" />
  <text x="110" y="200" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="600" fill="#f1f5f9">Pedido Recibido</text>
  <rect x="220" y="160" width="180" height="80" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2" />
  <text x="310" y="200" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="600" fill="#f1f5f9">1. Verificar Pedido</text>
  <rect x="480" y="160" width="80" height="80" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2" />
  <text x="520" y="200" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="600" fill="#f1f5f9">¿Stock Disponible?</text>
  <rect x="640" y="160" width="180" height="80" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2" />
  <text x="730" y="200" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="600" fill="#f1f5f9">2. Procesar Pago</text>
  <rect x="900" y="160" width="180" height="80" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2" />
  <text x="990" y="200" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="600" fill="#f1f5f9">3. Preparar Envío</text>
  <rect x="1160" y="160" width="180" height="80" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2" />
  <text x="1250" y="200" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="600" fill="#f1f5f9">4. Enviar Pedido</text>
  <rect x="1420" y="160" width="180" height="80" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2" />
  <text x="1510" y="200" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="600" fill="#f1f5f9">5. Notificar Sin Stock</text>
  <rect x="1680" y="170" width="60" height="60" rx="8" fill="#1e293b" stroke="#475569" stroke-width="2" />
  <text x="1710" y="200" text-anchor="middle" dominant-baseline="middle" font-size="13" font-weight="600" fill="#f1f5f9">Pedido Finalizado</text>
</svg>
</body>
</html>
